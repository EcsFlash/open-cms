        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/headless-cms_internal_models.News'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      summary: Получить новость по ID
      tags:
      - Новости
    patch:
      consumes:
      - application/json
      description: При обновлении short пересчитывается из content_markdown.
      parameters:
      - description: ID новости
        in: path
        name: id
        required: true
