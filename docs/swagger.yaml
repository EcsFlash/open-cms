basePath: /
definitions:
  handler.AuthLoginRequest:
    properties:
      nickname:
        example: alekc
        type: string
      password:
        example: qwerty123
        type: string
    type: object
  handler.AuthLoginResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  handler.AuthRegisterRequest:
    properties:
      nickname:
        example: alekc
        type: string
      password:
        example: qwerty123
        type: string
    type: object
  handler.AuthRegisterSupervisorRequest:
    properties:
      nickname:
        example: moderator1
        type: string
      password:
        example: qwerty123
        type: string
      role:
        allOf:
        - $ref: '#/definitions/models.Role'
        example: moderator
    type: object
  handler.ErrorResponse:
    properties:
      error:
        example: описание ошибки
        type: string
    type: object
  handler.MediaListAllResponse:
    properties:
      images:
        items:
          $ref: '#/definitions/models.Image'
        type: array
      videos:
        items:
          $ref: '#/definitions/models.Video'
        type: array
    type: object
  handler.MediaRenameBody:
    properties:
      name:
        example: hero-banner
        type: string
    type: object
  models.Article:
    properties:
      author_id:
        type: integer
      content_markdown:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_visible:
        type: boolean
      section_id:
        type: integer
      show_author:
        type: boolean
      title:
        type: string
      updated_at:
        type: string
    type: object
  models.Image:
    properties:
      bucket:
        type: string
      created_at:
        type: string
      height:
        type: integer
      id:
        type: integer
      mime:
        type: string
      name:
        description: used as alt
        type: string
      object_key_large:
        type: string
      object_key_medium:
        type: string
      object_key_mini:
        type: string
      object_key_original:
        type: string
      object_key_thumbnail:
        type: string
      updated_at:
        type: string
      uploader_id:
        type: integer
      width:
        type: integer
    type: object
  models.News:
    properties:
      author_id:
        type: integer
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      preview_image:
        $ref: '#/definitions/models.Image'
      preview_image_id:
        type: integer
      short:
        type: string
      show_author:
        type: boolean
      title:
        type: string
      updated_at:
        type: string
    type: object
  models.Role:
    enum:
    - user
    - moderator
    - admin
    type: string
    x-enum-varnames:
    - RoleUser
    - RoleModerator
    - RoleAdmin
  models.Section:
    properties:
      author_id:
        type: integer
      children:
        items:
          $ref: '#/definitions/models.Section'
        type: array
      created_at:
        type: string
      id:
        type: integer
      is_visible:
        type: boolean
      name:
        type: string
      parent_id:
        type: integer
      show_author:
        type: boolean
      updated_at:
        type: string
    type: object
  models.Settings:
    properties:
      banner_image_url:
        type: string
      banner_text:
        type: string
      created_at:
        type: string
      favicon_url:
        type: string
      id:
        type: integer
      logo_url:
        type: string
      meta_description:
        type: string
      meta_keywords:
        type: string
      meta_title:
        type: string
      og_image_url:
        type: string
      project_name:
        type: string
      updated_at:
        type: string
    type: object
  models.Theme:
    properties:
      created_at:
        type: string
      dark_bg:
        type: string
      dark_border:
        type: string
      dark_card:
        type: string
      dark_danger:
        type: string
      dark_primary:
        type: string
      dark_success:
        type: string
      dark_text:
        type: string
      id:
        type: integer
      light_bg:
        type: string
      light_border:
        type: string
      light_card:
        type: string
      light_danger:
        type: string
      light_primary:
        type: string
      light_success:
        type: string
      light_text:
        type: string
      updated_at:
        type: string
    type: object
  models.User:
    properties:
      created_at:
        type: string
      id:
        type: integer
      nickname:
        type: string
      role:
        $ref: '#/definitions/models.Role'
      updated_at:
        type: string
    type: object
  models.Video:
    properties:
      bucket:
        type: string
      created_at:
        type: string
      duration_sec:
        type: number
      id:
        type: integer
      mime:
        type: string
      name:
        type: string
      object_key:
        type: string
      thumbnail_image:
        $ref: '#/definitions/models.Image'
      thumbnail_image_id:
        type: integer
      updated_at:
        type: string
      uploader_id:
        type: integer
    type: object
info:
  contact: {}
  description: Headless CMS без фронтенда. Разделы, статьи (Markdown), новости (Markdown
    + автогенерация краткого описания), пользователи/роли, медиа (MinIO).
  title: Headless CMS API
  version: "1.0"
paths:
  /api/v1/articles:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Article'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Получить все статьи
      tags:
      - Статьи
    post:
      consumes:
      - application/json
      description: Доступно moderator и admin. Автор статьи назначается автоматически
        из JWT; author_id из тела запроса игнорируется.
      parameters:
      - description: Статья (id игнорируется)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.Article'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Article'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создать статью
      tags:
      - Статьи
  /api/v1/articles/{id}:
    delete:
      description: Admin может удалить любую статью. Moderator может удалить только
        свою статью.
      parameters:
      - description: ID статьи
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Удалить статью
      tags:
      - Статьи
    get:
      parameters:
      - description: ID статьи
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Article'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Получить статью по ID
      tags:
      - Статьи
    patch:
      consumes:
      - application/json
      description: Admin может обновить любую статью. Moderator может обновить только
        свою статью.
      parameters:
      - description: ID статьи
        in: path
        name: id
        required: true
        type: integer
      - description: Статья (id из path)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.Article'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Article'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Обновить статью
      tags:
      - Статьи
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 'Возвращает JWT. Для защищённых методов используйте заголовок Authorization:
        Bearer <token>.'
      parameters:
      - description: Данные входа
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.AuthLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AuthLoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Вход и получение JWT токена
      tags:
      - Авторизация
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Создаёт пользователя с ролью user (обычный читатель).
      parameters:
      - description: Данные регистрации
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.AuthRegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Регистрация пользователя
      tags:
      - Авторизация
  /api/v1/auth/register_supervisor:
    post:
      consumes:
      - application/json
      description: Создаёт пользователя с ролью moderator или admin. Доступно только
        пользователю с ролью admin.
      parameters:
      - description: Данные регистрации служебной учетной записи
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.AuthRegisterSupervisorRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Защищенный метод для регистрации служебных учетных записей, с предоставлением
        привелегий
      tags:
      - Авторизация
  /api/v1/images/{id}:
    delete:
      description: Admin может удалить любое изображение. Moderator может удалить
        только свое изображение. Удаляет запись и объект(ы) в MinIO, включая производные
        размеры.
      parameters:
      - description: ID изображения
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Удалить изображение
      tags:
      - Медиа
    get:
      parameters:
      - description: ID изображения
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Image'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Получить изображение по ID
      tags:
      - Медиа
    patch:
      consumes:
      - application/json
      description: Admin может переименовать любое изображение. Moderator может переименовать
        только свое изображение. Обновляет поле name (alt/подпись), файлы в MinIO
        не перезагружаются.
      parameters:
      - description: ID изображения
        in: path
        name: id
        required: true
        type: integer
      - description: Новое имя
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.MediaRenameBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Image'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Переименовать изображение
      tags:
      - Медиа
  /api/v1/media:
    get:
      description: Возвращает изображения, видео или всё сразу.
      parameters:
      - default: all
        description: 'Фильтр: images | videos | all'
        enum:
        - images
        - videos
        - all
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Если type=videos
          schema:
            items:
              $ref: '#/definitions/models.Video'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Получить медиа-материалы
      tags:
      - Медиа
  /api/v1/media/images:
    post:
      consumes:
      - multipart/form-data
      description: Доступно moderator и admin. Владелец изображения назначается автоматически
        из JWT. Загружает оригинал + генерирует копии large/medium/mini/thumbnail.
        Данные хранятся в MinIO и метаданные в Postgres.
      parameters:
      - description: Файл изображения
        in: formData
        name: file
        required: true
        type: file
      - description: Имя изображения (alt). Если не задано, берётся имя файла.
        in: formData
        name: name
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Image'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Загрузить изображение
      tags:
      - Медиа
  /api/v1/media/videos:
    post:
      consumes:
      - multipart/form-data
      description: Доступно moderator и admin. Владелец видео назначается автоматически
        из JWT. Загружает видео в MinIO. Если thumbnail_image_id не задан, thumbnail
        генерируется автоматически из первого кадра (ffmpeg) и сохраняется как Image
        того же владельца.
      parameters:
      - description: Файл видео
        in: formData
        name: file
        required: true
        type: file
      - description: Название видео. Если не задано, берётся имя файла.
        in: formData
        name: name
        type: string
      - description: ID существующей картинки (Image) как thumbnail
        in: formData
        name: thumbnail_image_id
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Video'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Загрузить видео
      tags:
      - Медиа
  /api/v1/news:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.News'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Получить список новостей
      tags:
      - Новости
    post:
      consumes:
      - application/json
      description: Доступно moderator и admin. Автор новости назначается автоматически
        из JWT; author_id из тела запроса игнорируется. Краткое описание (short) автоматически
        вычисляется из markdown-контента (картинки вырезаются regexp).
      parameters:
      - description: Новость (id игнорируется)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.News'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.News'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создать новость
      tags:
      - Новости
  /api/v1/news/{id}:
    delete:
      description: Admin может удалить любую новость. Moderator может удалить только
        свою новость.
      parameters:
      - description: ID новости
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Удалить новость
      tags:
      - Новости
    get:
      parameters:
      - description: ID новости
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.News'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Получить новость по ID
      tags:
      - Новости
    patch:
      consumes:
      - application/json
      description: Admin может обновить любую новость. Moderator может обновить только
        свою новость. При обновлении short пересчитывается из content_markdown.
      parameters:
      - description: ID новости
        in: path
        name: id
        required: true
        type: integer
      - description: Новость (id из path)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.News'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.News'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Обновить новость
      tags:
      - Новости
